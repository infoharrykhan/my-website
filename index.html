<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome 🤗</title>
<title>My Pro Website</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

/* HEADER */
.header {
    display: flex;
    justify-content: center;
    padding: 15px;
    gap: 10px;
}

.tab {
    padding: 10px 20px;
    border-radius: 30px;
    background: #ddd;
    cursor: pointer;
    transition: 0.3s;
}

.tab.active {
    background: linear-gradient(to right, orange, #ff6a00);
    color: white;
}

/* CARD GRID */
.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 15px;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.card:hover {
    transform: translateY(-5px);
}

.highlight {
    border: 3px solid orange;
    box-shadow: 0 0 15px orange;
}

.profit {
    background: #fff3e0;
    padding: 5px 10px;
    border-radius: 20px;
    display: inline-block;
    margin-top: 10px;
}

/* TIMELINE */
.timeline {
    margin: 20px;
    padding-left: 20px;
    border-left: 4px solid orange;
}

.step {
    margin-bottom: 30px;
    animation: fadeIn 1s ease;
}

.circle {
    width: 35px;
    height: 35px;
    background: orange;
    color: white;
    border-radius: 50%;
    text-align: center;
    line-height: 35px;
    margin-left: -40px;
    margin-bottom: 10px;
    font-weight: bold;
}

/* SUBSCRIBE */
.subscribe {
    margin: 20px;
    padding: 25px;
    border-radius: 20px;
    background: linear-gradient(to right, orange, #ff6a00);
    color: white;
    text-align: center;
}

.subscribe input {
    width: 80%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    margin-top: 10px;
}

.subscribe button {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 25px;
    border: none;
    background: white;
    color: orange;
    font-weight: bold;
    cursor: pointer;
}

/* FLOAT BUTTON */
.share {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(to right, orange, #ff6a00);
    color: white;
    padding: 12px 20px;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="tab active">বাংলাদেশ</div>
    <div class="tab">United Kingdom</div>
</div>

<!-- CARDS -->
<div class="container">

    <div class="card">
        <h3>Bank DPS</h3>
        <div class="profit">~9%</div>
    </div>

    <div class="card highlight">
        <h3>Gov Savings</h3>
        <div class="profit">~12%</div>
    </div>

    <div class="card">
        <h3>Mutual Fund</h3>
        <div class="profit">~8%</div>
    </div>

    <div class="card">
        <h3>Islamic DPS</h3>
        <div class="profit">~8%</div>
    </div>

</div>

<!-- TIMELINE -->
<div class="timeline">

    <div class="step">
        <div class="circle">18</div>
        <h3>Start Career</h3>
        <p>Begin your journey</p>
    </div>

    <div class="step">
        <div class="circle">25</div>
        <h3>Growth</h3>
        <p>Building wealth</p>
    </div>

    <div class="step">
        <div class="circle">40</div>
        <h3>Success</h3>
        <p>Financial Freedom</p>
    </div>

</div>

<!-- SUBSCRIBE -->
<div class="subscribe">
    <h2>More Tools Coming</h2>
    <input type="text" placeholder="Enter your email">
    <br>
    <button>Notify Me</button>
</div>

<!-- FLOAT BUTTON -->
<div class="share" onclick="shareNow()">Share</div>

<script>
function shareNow(){
    alert("Share button clicked!");
}
</script>

</body>
    </html>
