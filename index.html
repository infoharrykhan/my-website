<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Pro Website</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    scroll-behavior: smooth;
}

/* Navbar */
nav {
    background: #111;
    padding: 15px;
    text-align: center;
    position: sticky;
    top: 0;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
}

nav a:hover {
    color: #00ffcc;
}

/* Hero */
.hero {
    height: 100vh;
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Section */
section {
    padding: 60px 20px;
    text-align: center;
}

/* Card */
.card {
    background: white;
    padding: 20px;
    margin: 20px auto;
    max-width: 500px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* Button */
button {
    padding: 10px 20px;
    border: none;
    background: black;
    color: white;
    border-radius: 5px;
}

/* Sections color */
#about {background: #f4f4f4;}
#history {background: #ffe0b2;}
#contact {background: #c8e6c9;}
#upload {background: #f8bbd0;}

/* Image */
img {
    max-width: 150px;
    border-radius: 50%;
    margin-top: 10px;
}

/* WhatsApp Floating Button */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: green;
    color: white;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
    font-size: 20px;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#history">History</a>
<a href="#contact">Contact</a>
<a href="#upload">Upload</a>
</nav>

<!-- Hero -->
<div class="hero" id="home">
<h1>Welcome 😎</h1>
<p>My Professional Website</p>
</div>

<!-- About -->
<section id="about">
<div class="card">
<h2>About Me</h2>
<img src="https://via.placeholder.com/150">
<p>Write about yourself here</p>
</div>
</section>

<!-- History -->
<section id="history">
<div class="card">
<h2>History</h2>
<p>Your journey here</p>
</div>
</section>

<!-- Contact -->
<section id="contact">
<div class="card">
<h2>Contact</h2>
<p>Email: your@email.com</p>

<a href="https://wa.me/8801717865806" target="_blank">
<button>WhatsApp Me</button>
</a>

</div>
</section>

<!-- YouTube -->
<section>
<div class="card">
<h2>My Video</h2>
<iframe width="300" height="200" 
src="https://youtube.com/@ai_creation_2.0k?si=LHy53wI1LHFNuHwB"
frameborder="0" allowfullscreen>
</iframe>
</div>
</section>

<!-- Upload -->
<section id="upload">
<div class="card">
<h2>Upload Image</h2>
<input type="file" id="fileInput">
<br><br>
<button onclick="previewImage()">Preview</button>
<img id="preview">
</div>
</section>

<!-- WhatsApp Floating -->
<a href="https://wa.me/8801717865806" class="whatsapp" target="_blank">💬</a>

<script>
function previewImage() {
    const file = document.getElementById("fileInput").files[0];
    const preview = document.getElementById("preview");

    if (file) {
        preview.src = URL.createObjectURL(file);
    }
}
</script>

</body>
</html>
