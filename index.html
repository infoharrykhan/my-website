<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Pro Website</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* Navbar */
nav {
    background: black;
    padding: 15px;
    text-align: center;
    position: sticky;
    top: 0;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
}

nav a:hover {
    color: yellow;
}

/* Hero Section */
.hero {
    height: 100vh;
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Section */
section {
    padding: 50px;
    text-align: center;
}

/* Card */
.card {
    background: #f4f4f4;
    padding: 20px;
    margin: 20px;
    border-radius: 10px;
}

/* Button */
.btn {
    background: black;
    color: white;
    padding: 10px 20px;
    border: none;
}
</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</nav>

<div class="hero" id="home">
<h1>Welcome 😎</h1>
<p>This is my professional website</p>
<button class="btn">Explore</button>
</div>

<section id="about">
<div class="card">
<h2>About Me</h2>
<p>Write about yourself here</p>
</div>
</section>

<section id="contact">
<div class="card">
<h2>Contact</h2>
<p>Email: your@email.com</p>
</div>
</section>

</body>
</html>
